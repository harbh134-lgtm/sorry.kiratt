<!DOCTYPE html>
<html>
<head>
<title>Sorry Kirat ❤️</title>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ff7aa2;
  font-family:Arial,sans-serif;
}

.card{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:80%;
  max-width:500px;
}

h1{
  color:#ff3366;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ff3366;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="card">
  <h1>❤️ Sorry Kirat ❤️</h1>

  <p>
    I am sorry putt 🥺<br><br>

    I know I made a mistake.<br>
    I never wanted to hurt you.<br><br>

    You mean a lot to me and I miss your smile. ❤️<br><br>

    Love,<br>
    Harbhuuu 🌹
  </p>

  <button onclick="showMessage()">
    Open My Heart ❤️
  </button>
</div>

<script>
function showMessage(){
  document.body.innerHTML =
  '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ff3366;color:white;text-align:center;font-family:Arial;">' +
  '<div>' +
  '<h1 style="font-size:60px;">🥺 SORRY PUTT 🥺</h1>' +
  '<h2>Kirat ❤️</h2>' +
  '<p>Please forgive your Harbhuuu 🌹</p>' +
  '<div style="font-size:50px;">❤️ ❤️ ❤️</div>' +
  '</div>' +
  '</div>';
}
</script>

</body>
</html>
